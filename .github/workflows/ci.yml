name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build_and_test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.8.1
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint
      
      - name: Build
        run: pnpm run build
      
      - name: Run Tests
        run: pnpm run test
        continue-on-error: true # Ensure CI doesn't crash if tests don't exist yet
